<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚴 Đua Xe Đạp Online</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js">
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #1a0a2e, #0a0a1a);
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(#ff2d75, #a855f7); border-radius: 10px; }

        .app {
            max-width: 900px;
            margin: 0 auto;
            padding: 10px;
            display: none;
        }
        .app.active { display: block; }

        /* ====== LOGIN ====== */
        .login-screen {
            position: fixed;
            inset: 0;
            background: rgba(2, 4, 10, 0.98);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 15px;
        }
        .login-screen.hidden { display: none; }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 35px 30px;
            text-align: center;
            background: rgba(15, 23, 42, 0.98);
            border-radius: 24px;
            border: 2px solid #ff2d75;
            box-shadow: 0 0 60px rgba(255, 45, 117, 0.15);
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            0% { opacity:0; transform:scale(0.9) translateY(-30px); }
            100% { opacity:1; transform:scale(1) translateY(0); }
        }
        .login-box .logo { font-size: 48px; }
        .login-box h1 {
            font-size: 1.8rem;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(90deg, #ff2d75, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 5px 0 3px;
        }
        .login-box .sub { color: #8888aa; font-size: 0.8rem; margin-bottom: 18px; }

        .login-box input {
            width:100%; padding:12px 16px;
            background:rgba(2,6,23,0.8);
            border:1px solid #2a1a4a;
            border-radius:12px;
            color:#fff;
            font-size:0.9rem;
            margin-bottom:10px;
            outline:none;
            text-align:center;
        }
        .login-box input:focus { border-color:#ff2d75; box-shadow:0 0 25px rgba(255,45,117,0.15); }
        .login-box input::placeholder { color:#666; }

        .btn-login {
            width:100%; padding:12px;
            border:none; border-radius:12px;
            font-weight:700; font-size:0.9rem;
            cursor:pointer;
            background:linear-gradient(135deg,#ff2d75,#a855f7);
            color:#fff;
            transition:0.3s;
        }
        .btn-login:hover { box-shadow:0 0 40px rgba(255,45,117,0.2); transform:translateY(-2px); }

        /* ====== HEADER ====== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: rgba(17,17,34,0.9);
            border-radius: 14px;
            border: 1px solid #2a1a4a;
            margin-bottom: 10px;
        }
        .header .logo {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #ff2d75, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .user-info .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff2d75, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            color: #fff;
        }
        .header .user-info .name { font-size: 0.8rem; color: #e0e0ff; }
        .header .user-info .logout-btn {
            background: transparent;
            border: 1px solid #2a1a4a;
            color: #8888aa;
            padding: 4px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.65rem;
            transition: 0.3s;
        }
        .header .user-info .logout-btn:hover { border-color: #ef4444; color: #ef4444; }

        /* ====== LOBBY ====== */
        .lobby {
            background: rgba(17,17,34,0.9);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #2a1a4a;
            text-align: center;
        }
        .lobby .room-code {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(90deg, #ff2d75, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 5px 0;
        }
        .lobby .players {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .lobby .players .player-slot {
            background: rgba(2,6,23,0.6);
            border-radius: 12px;
            padding: 15px 10px;
            border: 1px solid #2a1a4a;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .lobby .players .player-slot .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff2d75, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
            margin-bottom: 4px;
        }
        .lobby .players .player-slot .name { font-size: 0.7rem; color: #e0e0ff; }
        .lobby .players .player-slot .status { font-size: 0.6rem; color: #8888aa; }
        .lobby .players .player-slot .status.ready { color: #22c55e; }
        .lobby .players .player-slot .status.waiting { color: #f59e0b; }
        .lobby .players .player-slot .status.playing { color: #00d4ff; }

        .lobby .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: linear-gradient(135deg, #ff2d75, #a855f7); color: #fff; }
        .btn-primary:hover { box-shadow: 0 0 30px rgba(255,45,117,0.3); }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-success:hover { background: #16a34a; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-warning { background: #f59e0b; color: #000; }
        .btn-warning:hover { background: #d97706; }
        .btn-outline { background: transparent; border: 1px solid #2a1a4a; color: #8888aa; }
        .btn-outline:hover { border-color: #ff2d75; color: #ff2d75; }
        .btn-sm { padding: 6px 14px; font-size: 0.7rem; }

        /* ====== GAME ====== */
        .game-container {
            background: rgba(17,17,34,0.9);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #2a1a4a;
            display: none;
        }
        .game-container.active { display: block; }

        .race-track {
            position: relative;
            background: rgba(2,6,23,0.6);
            border-radius: 12px;
            height: 400px;
            overflow: hidden;
            border: 2px solid #2a1a4a;
        }
        .race-track .finish-line {
            position: absolute;
            right: 10px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: repeating-linear-gradient(#ff2d75, #ff2d75 10px, transparent 10px, transparent 20px);
            opacity: 0.5;
        }
        .race-track .bike {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            transition: all 0.1s;
            z-index: 2;
            filter: drop-shadow(0 0 10px rgba(255,45,117,0.3));
        }
        .race-track .bike .name {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            color: #e0e0ff;
            white-space: nowrap;
            background: rgba(0,0,0,0.7);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .race-track .bike .speed {
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            color: #22c55e;
            background: rgba(0,0,0,0.7);
            padding: 0 6px;
            border-radius: 10px;
        }
        .race-track .bike .position {
            position: absolute;
            top: -20px;
            right: -10px;
            font-size: 0.6rem;
            font-weight: 700;
            color: #ff2d75;
            background: rgba(0,0,0,0.8);
            padding: 0 6px;
            border-radius: 10px;
        }
        .race-track .bike .boost-effect {
            position: absolute;
            top: 50%;
            left: -10px;
            transform: translateY(-50%);
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .race-track .bike .boost-effect.active {
            opacity: 1;
            animation: boostPulse 0.3s ease-out;
        }
        @keyframes boostPulse {
            0% { transform: translateY(-50%) scale(0.5); opacity: 1; }
            100% { transform: translateY(-50%) scale(2); opacity: 0; }
        }

        .race-track .bike.me { filter: drop-shadow(0 0 20px rgba(0,212,255,0.5)); }
        .race-track .bike .avatar-small {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.6rem;
            color: #fff;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* ====== CONTROLS ====== */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .controls .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid #2a1a4a;
            background: rgba(2,6,23,0.8);
            color: #fff;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }
        .controls .control-btn:active {
            transform: scale(0.9);
            border-color: #ff2d75;
            box-shadow: 0 0 30px rgba(255,45,117,0.2);
        }
        .controls .control-btn .key-hint {
            font-size: 0.5rem;
            color: #8888aa;
            margin-top: 2px;
        }
        .controls .control-btn .icon-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        /* ====== RANKING ====== */
        .ranking {
            margin-top: 10px;
            padding: 10px;
            background: rgba(2,6,23,0.6);
            border-radius: 12px;
            border: 1px solid #2a1a4a;
            display: none;
        }
        .ranking.active { display: block; }
        .ranking .rank-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            border-bottom: 1px solid #1a1a2e;
        }
        .ranking .rank-item .pos {
            font-weight: 700;
            color: #ff2d75;
            width: 30px;
        }
        .ranking .rank-item .name { flex: 1; font-size: 0.85rem; }
        .ranking .rank-item .time { color: #8888aa; font-size: 0.8rem; }

        /* ====== COUNTDOWN ====== */
        .countdown-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 12px;
        }
        .countdown-overlay.active { display: flex; }
        .countdown-overlay .number {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(90deg, #ff2d75, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: countPop 1s ease-out;
        }
        @keyframes countPop {
            0% { transform: scale(2); opacity: 0; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ====== RESPONSIVE ====== */
        @media (max-width: 600px) {
            .lobby .players { grid-template-columns: repeat(2, 1fr); }
            .controls .control-btn { width: 60px; height: 60px; font-size: 1.4rem; }
            .race-track { height: 350px; }
            .countdown-overlay .number { font-size: 4rem; }
            .login-box { padding: 25px 20px; }
        }
        @media (max-width: 400px) {
            .controls .control-btn { width: 50px; height: 50px; font-size: 1.2rem; }
            .race-track { height: 280px; }
            .lobby .players .player-slot { min-height: 60px; padding: 10px; }
        }

        /* ====== TOAST ====== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17,17,34,0.95);
            backdrop-filter: blur(20px);
            color: #fff;
            padding: 10px 20px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.85rem;
            border: 1px solid #2a1a4a;
            display: none;
            z-index: 999;
        }
        .toast.show { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp {
            0% { opacity:0; transform:translateX(-50%) translateY(20px); }
            100% { opacity:1; transform:translateX(-50%) translateY(0); }
        }

        /* ====== RESULTS ====== */
        .results {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }
        .results.show { display: flex; }
        .results .box {
            background: rgba(17,17,34,0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            border: 2px solid #ff2d75;
            text-align: center;
        }
        .results .box .trophy {
            font-size: 4rem;
            margin-bottom: 10px;
        }
        .results .box .winner {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff2d75;
        }
        .results .box .sub {
            color: #8888aa;
            font-size: 0.9rem;
            margin: 5px 0 15px;
        }
        .results .box .btn { margin-top: 10px; }
    </style>
</head>
<body>

    <!-- ====== LOGIN ====== -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="logo">🚴</div>
            <h1>Đua Xe Đạp</h1>
            <p class="sub">🏆 Đua cùng bạn bè - 4 người chơi</p>
            
            <div id="loginForm">
                <input type="text" id="loginUsername" placeholder="👤 Tên của bạn">
                <button class="btn-login" onclick="handleLogin()">🚴 Vào Phòng</button>
            </div>
        </div>
    </div>

    <!-- ====== MAIN APP ====== -->
    <div class="app" id="mainApp">

        <!-- HEADER -->
        <div class="header">
            <div class="logo">🚴 Đua Xe Đạp</div>
            <div class="user-info">
                <div class="avatar" id="userAvatar">A</div>
                <span class="name" id="userName">User</span>
                <button class="logout-btn" onclick="logout()">🚪</button>
            </div>
        </div>

        <!-- LOBBY -->
        <div class="lobby" id="lobby">
            <h3>🏠 Phòng Chờ</h3>
            <div class="room-code">🔑 Mã phòng: <span id="roomCode">------</span></div>
            
            <div class="players" id="playersList">
                <div class="player-slot">
                    <div class="avatar">👤</div>
                    <div class="name">Chờ người chơi...</div>
                    <div class="status waiting">⏳ Đang chờ</div>
                </div>
                <div class="player-slot">
                    <div class="avatar">👤</div>
                    <div class="name">Chờ người chơi...</div>
                    <div class="status waiting">⏳ Đang chờ</div>
                </div>
                <div class="player-slot">
                    <div class="avatar">👤</div>
                    <div class="name">Chờ người chơi...</div>
                    <div class="status waiting">⏳ Đang chờ</div>
                </div>
                <div class="player-slot">
                    <div class="avatar">👤</div>
                    <div class="name">Chờ người chơi...</div>
                    <div class="status waiting">⏳ Đang chờ</div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="startGame()">🏁 Bắt Đầu</button>
                <button class="btn btn-outline" onclick="createRoom()">🔄 Tạo Phòng Mới</button>
                <button class="btn btn-outline" onclick="leaveRoom()">🚪 Rời Phòng</button>
            </div>
        </div>

        <!-- GAME -->
        <div class="game-container" id="gameContainer">
            <div class="race-track" id="raceTrack">
                <div class="finish-line"></div>
                <div id="bikesContainer"></div>
                <div class="countdown-overlay" id="countdownOverlay">
                    <div class="number" id="countdownNumber">3</div>
                </div>
            </div>

            <!-- CONTROLS -->
            <div class="controls" id="controls">
                <button class="control-btn" id="btnUp" onmousedown="startPedal('up')" onmouseup="stopPedal()" ontouchstart="startPedal('up')" ontouchend="stopPedal()">
                    <div class="icon-wrap">
                        <i class="fas fa-arrow-up"></i>
                        <span class="key-hint">↑ / W</span>
                    </div>
                </button>
                <button class="control-btn" id="btnBoost" onmousedown="startBoost()" onmouseup="stopBoost()" ontouchstart="startBoost()" ontouchend="stopBoost()">
                    <div class="icon-wrap">
                        <i class="fas fa-bolt"></i>
                        <span class="key-hint">⚡ / Space</span>
                    </div>
                </button>
            </div>

            <!-- RANKING -->
            <div class="ranking" id="ranking">
                <div style="display:flex;justify-content:space-between;padding:5px 10px;border-bottom:1px solid #2a1a4a;font-weight:700;font-size:0.8rem;">
                    <span>#</span><span>Tên</span><span>Thời gian</span>
                </div>
                <div id="rankingList"></div>
            </div>
        </div>

    </div>

    <!-- ====== RESULTS ====== -->
    <div class="results" id="results">
        <div class="box">
            <div class="trophy" id="resultTrophy">🏆</div>
            <div class="winner" id="resultWinner">Người chiến thắng!</div>
            <div class="sub" id="resultSub">Hoàn thành trong 0s</div>
            <button class="btn btn-primary" onclick="backToLobby()">🏠 Về Phòng Chờ</button>
        </div>
    </div>

    <!-- ====== TOAST ====== -->
    <div class="toast" id="toast"></div>

    <script>
        // ====== FIREBASE ======
        const firebaseConfig = {
            apiKey: "AIzaSyAOcavYOsOGgRnmfPKeojppLoP6hPYe6pI",
            authDomain: "shopcuttay.firebaseapp.com",
            databaseURL: "https://shopcuttay-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shopcuttay",
            storageBucket: "shopcuttay.firebasestorage.app",
            messagingSenderId: "275809822981",
            appId: "1:275809822981:web:02e33ad2515eed78b32f6c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ====== GAME STATE ======
        let currentUser = null;
        let roomId = null;
        let gameRef = null;
        let players = {};
        let bikePositions = {};
        let isPlaying = false;
        let isPedaling = false;
        let isBoosting = false;
        let pedalInterval = null;
        let boostInterval = null;
        let gameLoop = null;
        let startTime = 0;
        let finishedPlayers = [];

        // ====== KEYBOARD CONTROLS ======
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                e.preventDefault();
                startPedal('up');
            }
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                startBoost();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                e.preventDefault();
                stopPedal();
            }
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                stopBoost();
            }
        });

        // ====== LOGIN ======
        function handleLogin() {
            const name = document.getElementById('loginUsername').value.trim() || 'Player';
            currentUser = name + '_' + Date.now().toString().slice(-4);
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.add('active');
            document.getElementById('userName').textContent = name;
            document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
            createRoom();
        }

        function logout() {
            leaveRoom();
            document.getElementById('mainApp').classList.remove('active');
            document.getElementById('loginScreen').classList.remove('hidden');
            currentUser = null;
        }

        // ====== ROOM ======
        function createRoom() {
            if (gameRef) {
                gameRef.off();
                gameRef.remove();
            }
            roomId = 'room_' + Date.now().toString().slice(-6);
            gameRef = db.ref('games/' + roomId);
            
            const playerData = {
                name: document.getElementById('userName').textContent,
                avatar: document.getElementById('userAvatar').textContent,
                ready: false,
                position: 0,
                finished: false,
                finishTime: 0
            };
            
            gameRef.set({
                players: { [currentUser]: playerData },
                status: 'waiting',
                startTime: 0,
                finished: []
            }).then(() => {
                document.getElementById('roomCode').textContent = roomId;
                joinRoom();
            });
        }

        function joinRoom() {
            // Lắng nghe cập nhật phòng
            gameRef.on('value', (snap) => {
                const data = snap.val();
                if (!data) return;
                
                players = data.players || {};
                const status = data.status || 'waiting';
                
                // Cập nhật danh sách người chơi
                updatePlayersList();
                
                // Nếu game đang chạy và chưa bắt đầu thì vào game
                if (status === 'playing' && !isPlaying) {
                    startGameplay();
                }
                
                // Cập nhật vị trí xe
                if (status === 'playing') {
                    updateBikes(players);
                }
                
                // Kiểm tra kết thúc
                if (data.finished && data.finished.length > 0) {
                    finishedPlayers = data.finished || [];
                    if (finishedPlayers.length >= 2) {
                        showResults();
                    }
                }
            });
        }

        function updatePlayersList() {
            const container = document.getElementById('playersList');
            const playerKeys = Object.keys(players);
            let html = '';
            
            for (let i = 0; i < 4; i++) {
                const key = playerKeys[i] || null;
                if (key && players[key]) {
                    const p = players[key];
                    const isMe = key === currentUser;
                    const statusText = p.ready ? '✅ Sẵn sàng' : '⏳ Đang chờ';
                    const statusClass = p.ready ? 'ready' : 'waiting';
                    html += `
                        <div class="player-slot" style="${isMe ? 'border-color:#00d4ff;' : ''}">
                            <div class="avatar">${p.avatar || '👤'}</div>
                            <div class="name">${p.name} ${isMe ? '(Bạn)' : ''}</div>
                            <div class="status ${statusClass}">${statusText}</div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="player-slot" style="opacity:0.5;">
                            <div class="avatar">👤</div>
                            <div class="name">Chờ người chơi...</div>
                            <div class="status waiting">⏳ Đang chờ</div>
                        </div>
                    `;
                }
            }
            container.innerHTML = html;
        }

        // ====== START GAME ======
        function startGame() {
            if (!gameRef) return;
            
            const playerKeys = Object.keys(players);
            if (playerKeys.length < 2) {
                showToast('⚠️ Cần ít nhất 2 người chơi!');
                return;
            }
            
            // Đánh dấu tất cả ready
            const updates = {};
            playerKeys.forEach(key => {
                updates['players/' + key + '/ready'] = true;
            });
            updates['status'] = 'playing';
            updates['startTime'] = Date.now();
            updates['finished'] = [];
            
            gameRef.update(updates).then(() => {
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('gameContainer').classList.add('active');
                startGameplay();
            });
        }

        // ====== GAMEPLAY ======
        function startGameplay() {
            if (isPlaying) return;
            isPlaying = true;
            
            // Reset
            bikePositions = {};
            finishedPlayers = [];
            startTime = Date.now();
            
            // Countdown
            const overlay = document.getElementById('countdownOverlay');
            overlay.classList.add('active');
            let count = 3;
            document.getElementById('countdownNumber').textContent = count;
            
            const countInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    document.getElementById('countdownNumber').textContent = count;
                } else {
                    clearInterval(countInterval);
                    overlay.classList.remove('active');
                    document.getElementById('countdownNumber').textContent = 'GO!';
                    setTimeout(() => {
                        overlay.classList.remove('active');
                    }, 300);
                    // Bắt đầu game loop
                    startGameLoop();
                }
            }, 1000);
        }

        function startGameLoop() {
            if (gameLoop) clearInterval(gameLoop);
            
            gameLoop = setInterval(() => {
                if (!isPlaying) return;
                
                // Cập nhật vị trí người chơi
                const speed = isBoosting ? 3 : (isPedaling ? 1.5 : 0.5);
                const currentPos = bikePositions[currentUser] || 0;
                const newPos = Math.min(currentPos + speed, 100);
                bikePositions[currentUser] = newPos;
                
                // Cập nhật lên Firebase
                if (gameRef) {
                    gameRef.child('players/' + currentUser + '/position').set(newPos);
                    
                    // Kiểm tra về đích
                    if (newPos >= 100 && !finishedPlayers.includes(currentUser)) {
                        const finishTime = (Date.now() - startTime) / 1000;
                        finishedPlayers.push(currentUser);
                        gameRef.child('players/' + currentUser + '/finished').set(true);
                        gameRef.child('players/' + currentUser + '/finishTime').set(finishTime);
                        gameRef.child('finished').set(finishedPlayers);
                        showToast(`🏁 ${document.getElementById('userName').textContent} đã về đích!`);
                    }
                }
                
                // Cập nhật xe
                updateBike(currentUser, newPos);
                
            }, 100);
        }

        function updateBike(userId, pos) {
            const container = document.getElementById('bikesContainer');
            let bikeEl = document.getElementById('bike-' + userId);
            
            if (!bikeEl) {
                const data = players[userId] || { name: 'Player', avatar: '👤' };
                bikeEl = document.createElement('div');
                bikeEl.id = 'bike-' + userId;
                bikeEl.className = 'bike' + (userId === currentUser ? ' me' : '');
                bikeEl.innerHTML = `
                    <div class="avatar-small" style="background:${userId === currentUser ? 'linear-gradient(135deg,#00d4ff,#a855f7)' : 'linear-gradient(135deg,#ff2d75,#a855f7)'}">
                        ${data.avatar || '👤'}
                    </div>
                    <span>🚴</span>
                    <div class="name">${data.name || 'Player'}</div>
                    <div class="speed">0 km/h</div>
                    <div class="position">#${Object.keys(players).length}</div>
                    <div class="boost-effect">💨</div>
                `;
                container.appendChild(bikeEl);
            }
            
            const trackWidth = document.getElementById('raceTrack').offsetWidth - 60;
            const xPos = 20 + (pos / 100) * trackWidth;
            bikeEl.style.left = xPos + 'px';
            
            // Cập nhật tốc độ
            const speedEl = bikeEl.querySelector('.speed');
            if (speedEl) {
                const speed = isBoosting ? 45 : (isPedaling ? 25 : 10);
                speedEl.textContent = speed + ' km/h';
                speedEl.style.color = isBoosting ? '#ff2d75' : (isPedaling ? '#22c55e' : '#8888aa');
            }
            
            // Cập nhật vị trí
            const posEl = bikeEl.querySelector('.position');
            if (posEl) {
                const rank = getPlayerRank(userId);
                posEl.textContent = '#' + rank;
            }
            
            // Boost effect
            const boostEl = bikeEl.querySelector('.boost-effect');
            if (boostEl && isBoosting && userId === currentUser) {
                boostEl.classList.add('active');
                setTimeout(() => boostEl.classList.remove('active'), 300);
            }
        }

        function updateBikes(playersData) {
            const container = document.getElementById('bikesContainer');
            const playerIds = Object.keys(playersData);
            
            playerIds.forEach(id => {
                const data = playersData[id];
                const pos = data.position || 0;
                updateBike(id, pos);
            });
            
            // Xóa xe của người chơi đã rời
            const existingBikes = container.querySelectorAll('.bike');
            existingBikes.forEach(el => {
                const id = el.id.replace('bike-', '');
                if (!playerIds.includes(id)) {
                    el.remove();
                }
            });
        }

        function getPlayerRank(userId) {
            const positions = {};
            Object.keys(players).forEach(id => {
                positions[id] = players[id].position || 0;
            });
            const sorted = Object.keys(positions).sort((a, b) => positions[b] - positions[a]);
            return sorted.indexOf(userId) + 1;
        }

        // ====== CONTROLS ======
        function startPedal(direction) {
            if (!isPlaying) return;
            isPedaling = true;
        }

        function stopPedal() {
            isPedaling = false;
        }

        function startBoost() {
            if (!isPlaying || !isPedaling) return;
            isBoosting = true;
        }

        function stopBoost() {
            isBoosting = false;
        }

        // ====== RESULTS ======
        function showResults() {
            const sorted = finishedPlayers.slice(0, 3);
            const winner = sorted[0] || '';
            
            document.getElementById('resultTrophy').textContent = winner === currentUser ? '🏆' : '🥈';
            document.getElementById('resultWinner').textContent = winner ? (players[winner]?.name || 'Player') + ' đã chiến thắng!' : 'Trận đấu kết thúc!';
            document.getElementById('resultSub').textContent = `Hoàn thành trong ${(players[winner]?.finishTime || 0).toFixed(1)}s`;
            document.getElementById('results').classList.add('show');
            
            if (gameLoop) clearInterval(gameLoop);
            isPlaying = false;
        }

        function backToLobby() {
            document.getElementById('results').classList.remove('show');
            document.getElementById('gameContainer').classList.remove('active');
            document.getElementById('lobby').style.display = 'block';
            document.getElementById('bikesContainer').innerHTML = '';
            
            // Reset game
            if (gameRef) {
                gameRef.child('status').set('waiting');
                gameRef.child('finished').set([]);
                Object.keys(players).forEach(key => {
                    gameRef.child('players/' + key + '/position').set(0);
                    gameRef.child('players/' + key + '/finished').set(false);
                    gameRef.child('players/' + key + '/finishTime').set(0);
                });
            }
            isPlaying = false;
            finishedPlayers = [];
        }

        function leaveRoom() {
            if (gameRef) {
                gameRef.off();
                if (currentUser) {
                    gameRef.child('players/' + currentUser).remove();
                }
                gameRef = null;
            }
            roomId = null;
            isPlaying = false;
            document.getElementById('gameContainer').classList.remove('active');
            document.getElementById('lobby').style.display = 'block';
            document.getElementById('bikesContainer').innerHTML = '';
        }

        // ====== TOAST ======
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('show'), 3000);
        }

        // ====== AUTO LOGIN ======
        window.onload = function() {
            // Không tự động login, chờ user nhập
        };
    </script>
</body>
</html>
