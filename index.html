<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚴 Đua Xe Đạp Online</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js">
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #1a0a2e, #0a0a1a);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(#ff2d75, #a855f7); border-radius: 10px; }

        .app {
            max-width: 900px;
            margin: 0 auto;
            padding: 10px;
            display: none;
        }
        .app.active { display: block; }

        /* ====== LOGIN ====== */
        .login-screen {
            position: fixed;
            inset: 0;
            background: rgba(2, 4, 10, 0.98);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 15px;
        }
        .login-screen.hidden { display: none; }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 35px 30px;
            text-align: center;
            background: rgba(15, 23, 42, 0.98);
            border-radius: 24px;
            border: 2px solid #ff2d75;
            box-shadow: 0 0 60px rgba(255, 45, 117, 0.15);
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            0% { opacity:0; transform:scale(0.9) translateY(-30px); }
            100% { opacity:1; transform:scale(1) translateY(0); }
        }
        .login-box .logo { font-size: 48px; }
        .login-box h1 {
            font-size: 1.8rem;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(90deg, #ff2d75, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 5px 0 3px;
        }
        .login-box .sub { color: #8888aa; font-size: 0.8rem; margin-bottom: 18px; }

        .login-box input {
            width:100%; padding:12px 16px;
            background:rgba(2,6,23,0.8);
            border:1px solid #2a1a4a;
            border-radius:12px;
            color:#fff;
            font-size:0.9rem;
            margin-bottom:10px;
            outline:none;
            text-align:center;
        }
        .login-box input:focus { border-color:#ff2d75; box-shadow:0 0 25px rgba(255,45,117,0.15); }
        .login-box input::placeholder { color:#666; }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: linear-gradient(135deg, #ff2d75, #a855f7); color: #fff; }
        .btn-primary:hover { box-shadow: 0 0 30px rgba(255,45,117,0.3); }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-success:hover { background: #16a34a; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-warning { background: #f59e0b; color: #000; }
        .btn-warning:hover { background: #d97706; }
        .btn-outline { background: transparent; border: 1px solid #2a1a4a; color: #8888aa; }
        .btn-outline:hover { border-color: #ff2d75; color: #ff2d75; }
        .btn-sm { padding: 6px 14px; font-size: 0.7rem; }

        /* ====== HEADER ====== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: rgba(17,17,34,0.9);
            border-radius: 14px;
            border: 1px solid #2a1a4a;
            margin-bottom: 10px;
        }
        .header .logo {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #ff2d75, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .user-info .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff2d75, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            color: #fff;
        }
        .header .user-info .name { font-size: 0.8rem; color: #e0e0ff; }
        .header .user-info .logout-btn {
            background: transparent;
            border: 1px solid #2a1a4a;
            color: #8888aa;
            padding: 4px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.65rem;
            transition: 0.3s;
        }
        .header .user-info .logout-btn:hover { border-color: #ef4444; color: #ef4444; }

        /* ====== COINS ====== */
        .coins-display {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,215,0,0.1);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .coins-display i { color: #f59e0b; }
        .coins-display span { font-weight: 700; color: #f59e0b; }

        /* ====== LOBBY ====== */
        .lobby {
            background: rgba(17,17,34,0.9);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #2a1a4a;
        }

        .lobby .lobby-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        .lobby .lobby-header h3 { font-size: 1rem; }

        /* ====== BIKE SHOP ====== */
        .bike-shop {
            background: rgba(2,6,23,0.6);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #2a1a4a;
        }
        .bike-shop .shop-title {
            font-weight: 700;
            color: #ff2d75;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .bike-shop .bike-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }
        .bike-shop .bike-item {
            background: rgba(17,17,34,0.8);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.3s;
        }
        .bike-shop .bike-item:hover { border-color: #ff2d75; }
        .bike-shop .bike-item.active { border-color: #00d4ff; background: rgba(0,212,255,0.05); }
        .bike-shop .bike-item .bike-icon { font-size: 2rem; display: block; }
        .bike-shop .bike-item .bike-name { font-size: 0.7rem; font-weight: 600; margin: 4px 0; }
        .bike-shop .bike-item .bike-price { font-size: 0.6rem; color: #f59e0b; }
        .bike-shop .bike-item .bike-stats { font-size: 0.55rem; color: #8888aa; }
        .bike-shop .bike-item .bike-owned { font-size: 0.55rem; color: #22c55e; }

        /* ====== ROOM LIST ====== */
        .room-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 10px 0;
            max-height: 200px;
            overflow-y: auto;
        }
        .room-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(2,6,23,0.6);
            border-radius: 10px;
            border: 1px solid #2a1a4a;
            flex-wrap: wrap;
            gap: 8px;
        }
        .room-item .room-info .room-id { font-weight: 700; color: #ff2d75; font-size: 0.9rem; }
        .room-item .room-info .room-players { font-size: 0.7rem; color: #8888aa; }
        .room-item .room-status { font-size: 0.65rem; }
        .room-item .room-status.waiting { color: #f59e0b; }
        .room-item .room-status.playing { color: #22c55e; }

        /* ====== CREATE ROOM ====== */
        .create-room {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        .create-room input {
            flex: 1;
            padding: 10px 14px;
            background: rgba(2,6,23,0.8);
            border: 1px solid #2a1a4a;
            border-radius: 10px;
            color: #fff;
            font-size: 0.85rem;
            outline: none;
            min-width: 120px;
        }
        .create-room input:focus { border-color: #ff2d75; }
        .create-room .btn { flex: 0 1 auto; }

        /* ====== GAME ====== */
        .game-container {
            background: rgba(17,17,34,0.9);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #2a1a4a;
            display: none;
        }
        .game-container.active { display: block; }

        .race-track {
            position: relative;
            background: rgba(2,6,23,0.6);
            border-radius: 12px;
            height: 400px;
            overflow: hidden;
            border: 2px solid #2a1a4a;
        }
        .race-track .finish-line {
            position: absolute;
            right: 10px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: repeating-linear-gradient(#ff2d75, #ff2d75 10px, transparent 10px, transparent 20px);
            opacity: 0.5;
        }
        .race-track .bike {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            transition: all 0.1s;
            z-index: 2;
            filter: drop-shadow(0 0 10px rgba(255,45,117,0.3));
        }
        .race-track .bike .name {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            color: #e0e0ff;
            white-space: nowrap;
            background: rgba(0,0,0,0.7);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .race-track .bike .speed {
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            color: #22c55e;
            background: rgba(0,0,0,0.7);
            padding: 0 6px;
            border-radius: 10px;
        }
        .race-track .bike .position {
            position: absolute;
            top: -20px;
            right: -10px;
            font-size: 0.6rem;
            font-weight: 700;
            color: #ff2d75;
            background: rgba(0,0,0,0.8);
            padding: 0 6px;
            border-radius: 10px;
        }
        .race-track .bike .boost-effect {
            position: absolute;
            top: 50%;
            left: -10px;
            transform: translateY(-50%);
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .race-track .bike .boost-effect.active {
            opacity: 1;
            animation: boostPulse 0.3s ease-out;
        }
        @keyframes boostPulse {
            0% { transform: translateY(-50%) scale(0.5); opacity: 1; }
            100% { transform: translateY(-50%) scale(2); opacity: 0; }
        }
        .race-track .bike.me { filter: drop-shadow(0 0 20px rgba(0,212,255,0.5)); }
        .race-track .bike .avatar-small {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.6rem;
            color: #fff;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
        }
        .race-track .bike.bot { filter: drop-shadow(0 0 10px rgba(168,85,247,0.3)); }

        /* ====== CONTROLS ====== */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .controls .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid #2a1a4a;
            background: rgba(2,6,23,0.8);
            color: #fff;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }
        .controls .control-btn:active {
            transform: scale(0.9);
            border-color: #ff2d75;
            box-shadow: 0 0 30px rgba(255,45,117,0.2);
        }
        .controls .control-btn .key-hint {
            font-size: 0.5rem;
            color: #8888aa;
            margin-top: 2px;
        }
        .controls .control-btn .icon-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        /* ====== RANKING ====== */
        .ranking {
            margin-top: 10px;
            padding: 10px;
            background: rgba(2,6,23,0.6);
            border-radius: 12px;
            border: 1px solid #2a1a4a;
            display: none;
        }
        .ranking.active { display: block; }
        .ranking .rank-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            border-bottom: 1px solid #1a1a2e;
        }
        .ranking .rank-item .pos {
            font-weight: 700;
            color: #ff2d75;
            width: 30px;
        }
        .ranking .rank-item .name { flex: 1; font-size: 0.85rem; }
        .ranking .rank-item .time { color: #8888aa; font-size: 0.8rem; }

        /* ====== COUNTDOWN ====== */
        .countdown-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 12px;
        }
        .countdown-overlay.active { display: flex; }
        .countdown-overlay .number {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(90deg, #ff2d75, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: countPop 1s ease-out;
        }
        @keyframes countPop {
            0% { transform: scale(2); opacity: 0; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ====== RESULTS ====== */
        .results {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }
        .results.show { display: flex; }
        .results .box {
            background: rgba(17,17,34,0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            border: 2px solid #ff2d75;
            text-align: center;
        }
        .results .box .trophy { font-size: 4rem; margin-bottom: 10px; }
        .results .box .winner { font-size: 1.5rem; font-weight: 700; color: #ff2d75; }
        .results .box .sub { color: #8888aa; font-size: 0.9rem; margin: 5px 0 15px; }
        .results .box .reward { color: #f59e0b; font-size: 0.9rem; margin-bottom: 10px; }

        /* ====== TOAST ====== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17,17,34,0.95);
            backdrop-filter: blur(20px);
            color: #fff;
            padding: 10px 20px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.85rem;
            border: 1px solid #2a1a4a;
            display: none;
            z-index: 999;
        }
        .toast.show { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp {
            0% { opacity:0; transform:translateX(-50%) translateY(20px); }
            100% { opacity:1; transform:translateX(-50%) translateY(0); }
        }

        /* ====== RESPONSIVE ====== */
        @media (max-width: 600px) {
            .bike-shop .bike-list { grid-template-columns: repeat(2, 1fr); }
            .controls .control-btn { width: 60px; height: 60px; font-size: 1.4rem; }
            .race-track { height: 350px; }
            .countdown-overlay .number { font-size: 4rem; }
            .login-box { padding: 25px 20px; }
            .room-item { flex-direction: column; align-items: stretch; text-align: center; }
        }
        @media (max-width: 400px) {
            .controls .control-btn { width: 50px; height: 50px; font-size: 1.2rem; }
            .race-track { height: 280px; }
            .bike-shop .bike-list { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <!-- ====== LOGIN ====== -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="logo">🚴</div>
            <h1>Đua Xe Đạp</h1>
            <p class="sub">🏆 Đua cùng bạn bè - 4 người chơi</p>
            
            <div id="loginForm">
                <input type="text" id="loginUsername" placeholder="👤 Tên của bạn">
                <button class="btn-login" onclick="handleLogin()">🚴 Vào Sảnh</button>
            </div>
        </div>
    </div>

    <!-- ====== MAIN APP ====== -->
    <div class="app" id="mainApp">

        <!-- HEADER -->
        <div class="header">
            <div class="logo">🚴 Đua Xe Đạp</div>
            <div class="user-info">
                <div class="avatar" id="userAvatar">A</div>
                <span class="name" id="userName">User</span>
                <div class="coins-display">
                    <i class="fas fa-coins"></i>
                    <span id="userCoins">100</span>
                </div>
                <button class="logout-btn" onclick="logout()">🚪</button>
            </div>
        </div>

        <!-- LOBBY -->
        <div class="lobby" id="lobby">
            <div class="lobby-header">
                <h3>🏠 Sảnh chính</h3>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <button class="btn btn-sm btn-primary" onclick="showShop()">🏪 Cửa hàng</button>
                    <button class="btn btn-sm btn-outline" onclick="refreshRooms()">🔄 Làm mới</button>
                </div>
            </div>

            <!-- Bike Shop -->
            <div class="bike-shop" id="bikeShop" style="display:none;">
                <div class="shop-title"><i class="fas fa-store"></i> Cửa hàng xe đạp</div>
                <div class="bike-list" id="bikeShopList"></div>
            </div>

            <!-- Create Room -->
            <div class="create-room">
                <input type="text" id="roomNameInput" placeholder="🏷️ Tên phòng (tùy chọn)">
                <button class="btn btn-primary" onclick="createRoom()">🆕 Tạo Phòng</button>
                <button class="btn btn-success" onclick="quickPlay()">⚡ Chơi Nhanh</button>
            </div>

            <!-- Room List -->
            <h4 style="margin:10px 0 5px;font-size:0.85rem;">📋 Danh sách phòng</h4>
            <div class="room-list" id="roomList">
                <div style="text-align:center;color:#8888aa;padding:20px;font-size:0.8rem;">
                    <i class="fas fa-spinner fa-spin"></i> Đang tải phòng...
                </div>
            </div>

            <!-- My Room -->
            <div id="myRoomContainer" style="margin-top:10px;"></div>
        </div>

        <!-- GAME -->
        <div class="game-container" id="gameContainer">
            <div class="race-track" id="raceTrack">
                <div class="finish-line"></div>
                <div id="bikesContainer"></div>
                <div class="countdown-overlay" id="countdownOverlay">
                    <div class="number" id="countdownNumber">3</div>
                </div>
            </div>

            <div class="controls" id="controls">
                <button class="control-btn" id="btnUp" onmousedown="startPedal()" onmouseup="stopPedal()" ontouchstart="startPedal()" ontouchend="stopPedal()">
                    <div class="icon-wrap">
                        <i class="fas fa-arrow-up"></i>
                        <span class="key-hint">↑ / W</span>
                    </div>
                </button>
                <button class="control-btn" id="btnBoost" onmousedown="startBoost()" onmouseup="stopBoost()" ontouchstart="startBoost()" ontouchend="stopBoost()">
                    <div class="icon-wrap">
                        <i class="fas fa-bolt"></i>
                        <span class="key-hint">⚡ / Space</span>
                    </div>
                </button>
            </div>

            <div class="ranking" id="ranking">
                <div style="display:flex;justify-content:space-between;padding:5px 10px;border-bottom:1px solid #2a1a4a;font-weight:700;font-size:0.8rem;">
                    <span>#</span><span>Tên</span><span>Thời gian</span>
                </div>
                <div id="rankingList"></div>
            </div>
        </div>

    </div>

    <!-- ====== RESULTS ====== -->
    <div class="results" id="results">
        <div class="box">
            <div class="trophy" id="resultTrophy">🏆</div>
            <div class="winner" id="resultWinner">Người chiến thắng!</div>
            <div class="sub" id="resultSub">Hoàn thành trong 0s</div>
            <div class="reward" id="resultReward">💰 +10 xu</div>
            <button class="btn btn-primary" onclick="backToLobby()">🏠 Về Sảnh</button>
        </div>
    </div>

    <!-- ====== TOAST ====== -->
    <div class="toast" id="toast"></div>

    <script>
        // ====== FIREBASE ======
        const firebaseConfig = {
            apiKey: "AIzaSyAOcavYOsOGgRnmfPKeojppLoP6hPYe6pI",
            authDomain: "shopcuttay.firebaseapp.com",
            databaseURL: "https://shopcuttay-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shopcuttay",
            storageBucket: "shopcuttay.firebasestorage.app",
            messagingSenderId: "275809822981",
            appId: "1:275809822981:web:02e33ad2515eed78b32f6c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ====== GAME STATE ======
        let currentUser = null;
        let currentRoomId = null;
        let gameRef = null;
        let players = {};
        let bikePositions = {};
        let isPlaying = false;
        let isPedaling = false;
        let isBoosting = false;
        let gameLoop = null;
        let startTime = 0;
        let finishedPlayers = [];
        let isBotGame = false;
        let botPlayers = {};
        let coins = 100;
        let userBikes = ['🚴'];
        let currentBike = '🚴';
        let bikeStats = { speed: 1, boost: 1 };

        // ====== BIKE DATA ======
        const BIKES = {
            '🚴': { name: 'Xe Cơ Bản', price: 0, speed: 1, boost: 1, emoji: '🚴' },
            '🚲': { name: 'Xe Địa Hình', price: 50, speed: 1.2, boost: 1.1, emoji: '🚲' },
            '🏍️': { name: 'Xe Thể Thao', price: 100, speed: 1.5, boost: 1.3, emoji: '🏍️' },
            '🛵': { name: 'Xe Điện', price: 150, speed: 1.3, boost: 1.5, emoji: '🛵' },
            '🚵': { name: 'Xe Đua Chuyên Nghiệp', price: 200, speed: 1.8, boost: 1.6, emoji: '🚵' },
            '🏁': { name: 'Xe Vô Địch', price: 300, speed: 2.0, boost: 2.0, emoji: '🏁' }
        };

        // ====== KEYBOARD CONTROLS ======
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                e.preventDefault();
                startPedal();
            }
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                startBoost();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                e.preventDefault();
                stopPedal();
            }
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                stopBoost();
            }
        });

        // ====== LOGIN ======
        function handleLogin() {
            const name = document.getElementById('loginUsername').value.trim() || 'Player';
            currentUser = name + '_' + Date.now().toString().slice(-4);
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.add('active');
            document.getElementById('userName').textContent = name;
            document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
            document.getElementById('userCoins').textContent = coins;
            loadUserData();
            loadRooms();
        }

        function logout() {
            leaveRoom();
            document.getElementById('mainApp').classList.remove('active');
            document.getElementById('loginScreen').classList.remove('hidden');
            currentUser = null;
        }

        function loadUserData() {
            db.ref('users/' + currentUser).once('value').then(snap => {
                if (snap.exists()) {
                    const data = snap.val();
                    coins = data.coins || 100;
                    userBikes = data.bikes || ['🚴'];
                    currentBike = data.currentBike || '🚴';
                    document.getElementById('userCoins').textContent = coins;
                } else {
                    db.ref('users/' + currentUser).set({
                        coins: 100,
                        bikes: ['🚴'],
                        currentBike: '🚴'
                    });
                }
                updateBikeShop();
            });
        }

        function saveUserData() {
            db.ref('users/' + currentUser).update({
                coins: coins,
                bikes: userBikes,
                currentBike: currentBike
            });
            document.getElementById('userCoins').textContent = coins;
        }

        // ====== BIKE SHOP ======
        function showShop() {
            const shop = document.getElementById('bikeShop');
            shop.style.display = shop.style.display === 'none' ? 'block' : 'none';
            updateBikeShop();
        }

        function updateBikeShop() {
            const container = document.getElementById('bikeShopList');
            let html = '';
            Object.keys(BIKES).forEach(key => {
                const bike = BIKES[key];
                const owned = userBikes.includes(key);
                const isActive = currentBike === key;
                html += `
                    <div class="bike-item ${isActive ? 'active' : ''}" onclick="selectBike('${key}')">
                        <span class="bike-icon">${bike.emoji}</span>
                        <div class="bike-name">${bike.name}</div>
                        <div class="bike-stats">⚡${bike.speed} 💨${bike.boost}</div>
                        ${owned ? `<div class="bike-owned">✅ Sở hữu</div>` : `<div class="bike-price">💰 ${bike.price} xu</div>`}
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function selectBike(bikeKey) {
            if (userBikes.includes(bikeKey)) {
                currentBike = bikeKey;
                bikeStats = BIKES[bikeKey];
                saveUserData();
                updateBikeShop();
                showToast(`✅ Đã chọn ${BIKES[bikeKey].name}`);
            } else {
                const bike = BIKES[bikeKey];
                if (coins >= bike.price) {
                    coins -= bike.price;
                    userBikes.push(bikeKey);
                    currentBike = bikeKey;
                    bikeStats = bike;
                    saveUserData();
                    updateBikeShop();
                    showToast(`🎉 Đã mua ${bike.name}!`);
                } else {
                    showToast(`❌ Không đủ xu! Cần ${bike.price} xu`);
                }
            }
        }

        // ====== ROOMS ======
        function loadRooms() {
            db.ref('rooms').on('value', (snap) => {
                const data = snap.val();
                const container = document.getElementById('roomList');
                if (!data) {
                    container.innerHTML = `
                        <div style="text-align:center;color:#8888aa;padding:20px;font-size:0.8rem;">
                            <i class="fas fa-door-open"></i> Chưa có phòng nào. Hãy tạo phòng mới!
                        </div>
                    `;
                    return;
                }
                let html = '';
                Object.keys(data).forEach(roomId => {
                    const room = data[roomId];
                    if (room.status === 'playing') return;
                    const playerCount = room.players ? Object.keys(room.players).length : 0;
                    html += `
                        <div class="room-item">
                            <div class="room-info">
                                <div class="room-id">🔑 ${room.name || roomId}</div>
                                <div class="room-players">👥 ${playerCount}/4 người</div>
                            </div>
                            <div class="room-status waiting">⏳ Đang chờ</div>
                            <button class="btn btn-sm btn-success" onclick="joinRoom('${roomId}')">🚴 Vào phòng</button>
                        </div>
                    `;
                });
                container.innerHTML = html || `<div style="text-align:center;color:#8888aa;padding:20px;font-size:0.8rem;">Chưa có phòng nào.</div>`;
            });
        }

        function refreshRooms() {
            loadRooms();
            showToast('🔄 Đã làm mới danh sách phòng');
        }

        function createRoom() {
            const nameInput = document.getElementById('roomNameInput');
            const roomName = nameInput.value.trim() || 'Phòng của ' + document.getElementById('userName').textContent;
            const roomId = 'room_' + Date.now().toString().slice(-6);
            
            if (currentRoomId) {
                leaveRoom();
            }
            
            currentRoomId = roomId;
            gameRef = db.ref('rooms/' + roomId);
            
            const playerData = {
                name: document.getElementById('userName').textContent,
                avatar: document.getElementById('userAvatar').textContent,
                bike: currentBike,
                ready: false,
                position: 0,
                finished: false,
                finishTime: 0,
                isBot: false
            };
            
            gameRef.set({
                name: roomName,
                host: currentUser,
                status: 'waiting',
                players: { [currentUser]: playerData },
                startTime: 0,
                finished: []
            }).then(() => {
                nameInput.value = '';
                document.getElementById('myRoomContainer').innerHTML = `
                    <div style="background:rgba(2,6,23,0.6);border-radius:12px;padding:12px;border:1px solid #2a1a4a;text-align:center;">
                        <div style="font-weight:700;color:#ff2d75;">🏠 Phòng: ${roomName}</div>
                        <div style="font-size:0.8rem;color:#8888aa;">🔑 Mã: ${roomId}</div>
                        <div style="margin-top:8px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
                            <button class="btn btn-sm btn-primary" onclick="startGame()">🏁 Bắt đầu</button>
                            <button class="btn btn-sm btn-danger" onclick="leaveRoom()">🚪 Rời phòng</button>
                        </div>
                    </div>
                `;
                showToast(`✅ Đã tạo phòng: ${roomName}`);
                joinRoomListener();
            });
        }

        function quickPlay() {
            // Tìm phòng có sẵn hoặc tạo mới
            db.ref('rooms').once('value', (snap) => {
                const data = snap.val();
                if (data) {
                    let found = false;
                    Object.keys(data).forEach(roomId => {
                        const room = data[roomId];
                        if (room.status === 'waiting' && (!room.players || Object.keys(room.players).length < 4)) {
                            joinRoom(roomId);
                            found = true;
                            return;
                        }
                    });
                    if (!found) createRoom();
                } else {
                    createRoom();
                }
            });
        }

        function joinRoom(roomId) {
            if (currentRoomId) leaveRoom();
            currentRoomId = roomId;
            gameRef = db.ref('rooms/' + roomId);
            
            const playerData = {
                name: document.getElementById('userName').textContent,
                avatar: document.getElementById('userAvatar').textContent,
                bike: currentBike,
                ready: false,
                position: 0,
                finished: false,
                finishTime: 0,
                isBot: false
            };
            
            gameRef.child('players/' + currentUser).set(playerData).then(() => {
                document.getElementById('myRoomContainer').innerHTML = `
                    <div style="background:rgba(2,6,23,0.6);border-radius:12px;padding:12px;border:1px solid #2a1a4a;text-align:center;">
                        <div style="font-weight:700;color:#00d4ff;">🔗 Đã vào phòng</div>
                        <div style="font-size:0.8rem;color:#8888aa;">⏳ Đợi chủ phòng bắt đầu...</div>
                        <button class="btn btn-sm btn-danger" onclick="leaveRoom()" style="margin-top:8px;">🚪 Rời phòng</button>
                    </div>
                `;
                showToast('✅ Đã vào phòng!');
                joinRoomListener();
            });
        }

        function joinRoomListener() {
            if (!gameRef) return;
            gameRef.on('value', (snap) => {
                const data = snap.val();
                if (!data) return;
                
                players = data.players || {};
                const status = data.status || 'waiting';
                
                updatePlayersList();
                
                if (status === 'playing' && !isPlaying) {
                    startGameplay();
                }
                
                if (status === 'playing') {
                    updateBikes(players);
                }
                
                if (data.finished && data.finished.length > 0) {
                    finishedPlayers = data.finished || [];
                    if (finishedPlayers.length >= 2 || finishedPlayers.length === Object.keys(players).length) {
                        showResults();
                    }
                }
            });
        }

        function updatePlayersList() {
            const container = document.getElementById('playersList');
            if (!container) return;
            
            const playerKeys = Object.keys(players);
            let html = '';
            
            for (let i = 0; i < 4; i++) {
                const key = playerKeys[i] || null;
                if (key && players[key]) {
                    const p = players[key];
                    const isMe = key === currentUser;
                    const isBot = p.isBot || false;
                    html += `
                        <div class="player-slot" style="${isMe ? 'border-color:#00d4ff;' : ''}">
                            <div class="avatar">${p.avatar || '👤'}</div>
                            <div class="name">${p.name} ${isMe ? '(Bạn)' : ''} ${isBot ? '🤖' : ''}</div>
                            <div class="status ${p.ready ? 'ready' : 'waiting'}">${p.ready ? '✅ Sẵn sàng' : '⏳ Đang chờ'}</div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="player-slot" style="opacity:0.5;">
                            <div class="avatar">👤</div>
                            <div class="name">Chờ người chơi...</div>
                            <div class="status waiting">⏳ Đang chờ</div>
                        </div>
                    `;
                }
            }
            container.innerHTML = html;
        }

        function leaveRoom() {
            if (gameRef) {
                if (currentUser) {
                    gameRef.child('players/' + currentUser).remove();
                }
                gameRef.off();
                gameRef = null;
            }
            currentRoomId = null;
            isPlaying = false;
            document.getElementById('gameContainer').classList.remove('active');
            document.getElementById('myRoomContainer').innerHTML = '';
            document.getElementById('bikesContainer').innerHTML = '';
            document.getElementById('lobby').style.display = 'block';
            showToast('🚪 Đã rời phòng');
        }

        // ====== START GAME ======
        function startGame() {
            if (!gameRef) return;
            
            const playerKeys = Object.keys(players);
            if (playerKeys.length < 2) {
                // Thêm bot nếu thiếu người
                addBots();
            }
            
            // Đánh dấu tất cả ready
            const updates = {};
            Object.keys(players).forEach(key => {
                updates['players/' + key + '/ready'] = true;
            });
            updates['status'] = 'playing';
            updates['startTime'] = Date.now();
            updates['finished'] = [];
            
            gameRef.update(updates).then(() => {
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('gameContainer').classList.add('active');
                startGameplay();
            });
        }

        function addBots() {
            const playerKeys = Object.keys(players);
            const botCount = 4 - playerKeys.length;
            const botNames = ['🤖 Bot Xanh', '🤖 Bot Đỏ', '🤖 Bot Tím'];
            const botEmojis = ['🟦', '🟥', '🟪'];
            
            for (let i = 0; i < botCount && i < 3; i++) {
                const botId = 'bot_' + Date.now() + '_' + i;
                players[botId] = {
                    name: botNames[i] || '🤖 Bot',
                    avatar: botEmojis[i] || '🤖',
                    bike: Object.keys(BIKES)[Math.floor(Math.random() * 3)],
                    ready: true,
                    position: 0,
                    finished: false,
                    finishTime: 0,
                    isBot: true,
                    botLevel: Math.random() * 0.5 + 0.5
                };
                gameRef.child('players/' + botId).set(players[botId]);
            }
            isBotGame = true;
        }

        // ====== GAMEPLAY ======
        function startGameplay() {
            if (isPlaying) return;
            isPlaying = true;
            
            bikePositions = {};
            finishedPlayers = [];
            startTime = Date.now();
            
            // Reset positions
            Object.keys(players).forEach(key => {
                bikePositions[key] = 0;
                if (gameRef) {
                    gameRef.child('players/' + key + '/position').set(0);
                    gameRef.child('players/' + key + '/finished').set(false);
                    gameRef.child('players/' + key + '/finishTime').set(0);
                }
            });
            
            // Countdown
            const overlay = document.getElementById('countdownOverlay');
            overlay.classList.add('active');
            let count = 3;
            document.getElementById('countdownNumber').textContent = count;
            
            const countInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    document.getElementById('countdownNumber').textContent = count;
                } else {
                    clearInterval(countInterval);
                    overlay.classList.remove('active');
                    document.getElementById('countdownNumber').textContent = 'GO!';
                    setTimeout(() => {
                        overlay.classList.remove('active');
                    }, 300);
                    startGameLoop();
                }
            }, 1000);
        }

        function startGameLoop() {
            if (gameLoop) clearInterval(gameLoop);
            
            gameLoop = setInterval(() => {
                if (!isPlaying) return;
                
                // Cập nhật vị trí người chơi
                const speed = isBoosting ? bikeStats.boost * 2 : (isPedaling ? bikeStats.speed * 1.5 : 0.5);
                const currentPos = bikePositions[currentUser] || 0;
                const newPos = Math.min(currentPos + speed, 100);
                bikePositions[currentUser] = newPos;
                
                if (gameRef) {
                    gameRef.child('players/' + currentUser + '/position').set(newPos);
                    
                    if (newPos >= 100 && !finishedPlayers.includes(currentUser)) {
                        const finishTime = (Date.now() - startTime) / 1000;
                        finishedPlayers.push(currentUser);
                        gameRef.child('players/' + currentUser + '/finished').set(true);
                        gameRef.child('players/' + currentUser + '/finishTime').set(finishTime);
                        gameRef.child('finished').set(finishedPlayers);
                        showToast(`🏁 ${document.getElementById('userName').textContent} đã về đích!`);
                    }
                }
                
                updateBike(currentUser, newPos);
                updateBotPositions();
                
            }, 100);
        }

        function updateBotPositions() {
            if (!gameRef) return;
            
            Object.keys(players).forEach(key => {
                if (key === currentUser || !players[key].isBot) return;
                
                const bot = players[key];
                const botSpeed = (0.3 + Math.random() * 0.4) * (bot.botLevel || 0.5);
                const currentPos = bikePositions[key] || 0;
                const newPos = Math.min(currentPos + botSpeed, 100);
                bikePositions[key] = newPos;
                
                gameRef.child('players/' + key + '/position').set(newPos);
                
                if (newPos >= 100 && !finishedPlayers.includes(key)) {
                    const finishTime = (Date.now() - startTime) / 1000;
                    finishedPlayers.push(key);
                    gameRef.child('players/' + key + '/finished').set(true);
                    gameRef.child('players/' + key + '/finishTime').set(finishTime);
                    gameRef.child('finished').set(finishedPlayers);
                }
                
                updateBike(key, newPos);
            });
        }

        function updateBike(userId, pos) {
            const container = document.getElementById('bikesContainer');
            let bikeEl = document.getElementById('bike-' + userId);
            const isBot = players[userId]?.isBot || false;
            const bikeEmoji = players[userId]?.bike || '🚴';
            
            if (!bikeEl) {
                const data = players[userId] || { name: 'Player', avatar: '👤' };
                bikeEl = document.createElement('div');
                bikeEl.id = 'bike-' + userId;
                bikeEl.className = 'bike' + (userId === currentUser ? ' me' : '') + (isBot ? ' bot' : '');
                bikeEl.innerHTML = `
                    <div class="avatar-small" style="background:${userId === currentUser ? 'linear-gradient(135deg,#00d4ff,#a855f7)' : 'linear-gradient(135deg,#ff2d75,#a855f7)'}">
                        ${data.avatar || '👤'}
                    </div>
                    <span>${bikeEmoji}</span>
                    <div class="name">${data.name || 'Player'}</div>
                    <div class="speed">0 km/h</div>
                    <div class="position">#${Object.keys(players).length}</div>
                    <div class="boost-effect">💨</div>
                `;
                container.appendChild(bikeEl);
            }
            
            const trackWidth = document.getElementById('raceTrack').offsetWidth - 60;
            const xPos = 20 + (pos / 100) * trackWidth;
            bikeEl.style.left = xPos + 'px';
            
            const speedEl = bikeEl.querySelector('.speed');
            if (speedEl) {
                const speed = userId === currentUser ? (isBoosting ? 45 : (isPedaling ? 25 : 10)) : (isBot ? 15 + Math.random() * 10 : 10);
                speedEl.textContent = Math.round(speed) + ' km/h';
                speedEl.style.color = isBoosting ? '#ff2d75' : (isPedaling ? '#22c55e' : '#8888aa');
            }
            
            const posEl = bikeEl.querySelector('.position');
            if (posEl) {
                const rank = getPlayerRank(userId);
                posEl.textContent = '#' + rank;
            }
            
            const boostEl = bikeEl.querySelector('.boost-effect');
            if (boostEl && isBoosting && userId === currentUser) {
                boostEl.classList.add('active');
                setTimeout(() => boostEl.classList.remove('active'), 300);
            }
        }

        function updateBikes(playersData) {
            const container = document.getElementById('bikesContainer');
            const playerIds = Object.keys(playersData);
            
            playerIds.forEach(id => {
                const data = playersData[id];
                const pos = data.position || 0;
                updateBike(id, pos);
            });
            
            const existingBikes = container.querySelectorAll('.bike');
            existingBikes.forEach(el => {
                const id = el.id.replace('bike-', '');
                if (!playerIds.includes(id)) {
                    el.remove();
                }
            });
        }

        function getPlayerRank(userId) {
            const positions = {};
            Object.keys(players).forEach(id => {
                positions[id] = players[id].position || 0;
            });
            const sorted = Object.keys(positions).sort((a, b) => positions[b] - positions[a]);
            return sorted.indexOf(userId) + 1;
        }

        // ====== CONTROLS ======
        function startPedal() {
            if (!isPlaying) return;
            isPedaling = true;
        }

        function stopPedal() {
            isPedaling = false;
        }

        function startBoost() {
            if (!isPlaying || !isPedaling) return;
            isBoosting = true;
        }

        function stopBoost() {
            isBoosting = false;
        }

        // ====== RESULTS ======
        function showResults() {
            const sorted = finishedPlayers.slice(0, 3);
            const winner = sorted[0] || '';
            const reward = winner === currentUser ? 20 : (finishedPlayers.includes(currentUser) ? 10 : 0);
            
            if (winner === currentUser) {
                coins += reward;
                saveUserData();
            }
            
            document.getElementById('resultTrophy').textContent = winner === currentUser ? '🏆' : '🥈';
            document.getElementById('resultWinner').textContent = winner ? (players[winner]?.name || 'Player') + ' đã chiến thắng!' : 'Trận đấu kết thúc!';
            document.getElementById('resultSub').textContent = `Hoàn thành trong ${(players[winner]?.finishTime || 0).toFixed(1)}s`;
            document.getElementById('resultReward').textContent = `💰 +${reward} xu`;
            document.getElementById('results').classList.add('show');
            
            if (gameLoop) clearInterval(gameLoop);
            isPlaying = false;
        }

        function backToLobby() {
            document.getElementById('results').classList.remove('show');
            document.getElementById('gameContainer').classList.remove('active');
            document.getElementById('lobby').style.display = 'block';
            document.getElementById('bikesContainer').innerHTML = '';
            
            if (gameRef) {
                gameRef.child('status').set('waiting');
                gameRef.child('finished').set([]);
                Object.keys(players).forEach(key => {
                    gameRef.child('players/' + key + '/position').set(0);
                    gameRef.child('players/' + key + '/finished').set(false);
                    gameRef.child('players/' + key + '/finishTime').set(0);
                });
            }
            isPlaying = false;
            finishedPlayers = [];
            isBotGame = false;
            showToast('🏠 Đã về sảnh');
        }

        // ====== TOAST ======
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('show'), 3000);
        }

        // ====== AUTO LOGIN ======
        window.onload = function() {
            // Chờ người dùng nhập tên
        };
    </script>
</body>
</html>
